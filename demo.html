<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C++ Code Highlighting Example</title>
  <!-- Include highlight.js stylesheet -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/10.7.2/styles/github.min.css">
  <!-- Include your custom styles if needed -->
  <style>
    /* Custom styles go here */
    body {
      background-color: #f8f4e6; /* Match the background color of the conversation */
      color: #333; /* Default text color */
    }
    pre {
      background-color: #f8f4e6; /* Match the background color of the conversation */
      border-radius: 10px;
      padding: 20px;
      overflow-x: auto;
    }
    code {
      color: inherit; /* Inherit text color from body */
    }
  </style>
</head>
<body>

  <h1>C++ Code Highlighting Example</h1>

  <div class="container-box">
    <pre>
      <code class="cpp">
        #include <iostream>
        using namespace std;

        int main() {
            cout << "Hello, world!" << endl;
            return 0;
        }
      </code>
    </pre>
  </div>

  <!-- Include highlight.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/10.7.2/highlight.min.js"></script>
  <!-- Initialize highlight.js for C++ -->
  <script>hljs.highlightAll();</script>

</body>
</html>
